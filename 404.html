<!DOCTYPE html>
<html lang="fr-CA">
<head>
  <meta charset="utf-8">
  <title>Anny Williams</title>
  <script>
    // Redirect SPA pour domaine personnalisé (annywilliams.com)
    // Stocke le chemin complet en sessionStorage et redirige vers /
    var path = window.location.pathname;
    var search = window.location.search;
    var hash = window.location.hash;
    sessionStorage.setItem('spa_redirect', path + search + hash);
    window.location.replace('/');
  </script>
</head>
<body></body>
</html>
